<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') { document.documentElement.classList.remove('dark'); }
        else { document.documentElement.classList.add('dark'); }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->
    <title>Ghost Rave & Awards 2026 — Vote Now</title>
    <meta name="description" content="Vote for your favourites at the Ghost Rave & Awards 2026. Celebrating digital excellence in music, art, and culture. Vote opens now!" />
    <meta name="theme-color" content="#8b4fd8" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ghost Awards" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/app-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/app-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="Ghost Rave & Awards 2026 — Vote Now" />
    <meta property="og:description" content="Vote for your favourites at the Ghost Rave & Awards 2026. Celebrating digital excellence in music, art, and culture." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="Ghost Rave and Awards 2026" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ghost Rave & Awards 2026 — Vote Now" />
    <meta name="twitter:description" content="Vote for your favourites at the Ghost Rave & Awards 2026. Celebrating digital excellence in music, art, and culture." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Ghost Rave and Awards 2026" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
