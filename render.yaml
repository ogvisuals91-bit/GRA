services:
  - type: web
    name: ghost-awards
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ghost-awards-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: ghost-awards-db
    plan: free
    databaseName: ghost_awards
    user: ghost_awards
